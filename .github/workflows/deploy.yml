name: Build & Deploy

on:
  push:
    branches: [main] # triggers on every push to main
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Build image & restart container
    runs-on: self-hosted # your self-hosted runner on the server

    steps:
      # ── 1. Checkout latest code ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (faster multi-layer caching) ─────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker # use the local Docker daemon directly

      # ── 3. Build Docker image ─────────────────────────────────────────────────
      - name: Build image
        run: |
          docker build \
            --tag university_app:latest \
            --tag university_app:${{ github.sha }} \
            --cache-from university_app:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

      # ── 4. Create required host directories (first-time setup) ────────────────
      - name: Ensure data & uploads dirs exist
        run: |
          mkdir -p data public/uploads

      # ── 5. Stop old container & start new one ────────────────────────────────
      - name: Deploy with Docker Compose
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d

      # ── 6. Remove dangling images to save disk space ──────────────────────────
      - name: Prune old images
        run: docker image prune -f

      # ── 7. Health check ───────────────────────────────────────────────────────
      - name: Health check
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/settings || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is healthy (HTTP 200)"
              exit 0
            fi
            echo "  Attempt $i: HTTP $STATUS — retrying in 4s..."
            sleep 4
          done
          echo "❌ Health check failed after 60s"
          docker compose logs --tail=50
          exit 1

      # ── 8. Summary ────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "### ✅ Deployment successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **App URL:** http://$(hostname):3000" >> $GITHUB_STEP_SUMMARY
