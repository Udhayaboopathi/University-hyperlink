name: Deploy NextJS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync project to server
        run: |
          mkdir -p /var/www/nextjs-app
          rsync -av --delete ./ /var/www/nextjs-app/

      - name: Deploy Docker Container
        run: |
          cd /var/www/nextjs-app
          docker compose down
          docker compose build
          docker compose up -d
